<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Music Visualizer (Auto-Record on Play)</title>
<style>
  :root { color-scheme: dark; }
  html, body { margin:0; height:100%; background:#000; overflow:hidden; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
  canvas { display:block; width:100vw; height:100vh; }

  #controls{
    position: fixed;
    top: 12px; left: 12px;
    z-index: 10;
    background: rgba(0,0,0,0.55);
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 12px;
    padding: 10px;
    display: grid;
    gap: 8px;
    backdrop-filter: blur(8px);
    max-width: min(1020px, calc(100vw - 24px));
    transition: opacity 160ms ease;
  }
  #controls.hidden{
    opacity: 0;
    pointer-events: none;
  }

  #row { display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
  button, input[type="file"], input[type="text"], select {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.16);
    color: #fff;
    border-radius: 10px;
    padding: 9px 12px;
  }
  button { cursor: pointer; }
  button:disabled{ opacity:0.5; cursor:not-allowed; }
  label { display:flex; gap:8px; align-items:center; font-size: 13px; opacity:0.9; }
  input[type="range"]{ width: 160px; }
  input[type="text"]{ width: 220px; }
  #status { font-size:12px; opacity:0.85; }
  #miniHint {
    position: fixed;
    right: 14px;
    bottom: 14px;
    z-index: 9;
    font-size: 12px;
    opacity: 0.75;
    background: rgba(0,0,0,0.45);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    padding: 8px 10px;
    user-select: none;
  }
</style>
</head>
<body>

<div id="controls">
  <div id="row">
    <input type="file" id="file" accept="audio/*" />
    <button id="play" disabled>Play</button>
    <button id="pause" disabled>Pause</button>
    <button id="stop" disabled>Stop</button>
    <button id="clear">Clear</button>
    <button id="toggleUI">Hide UI</button>
  </div>

  <div id="row">
    <label>Intensity <input id="intensity" type="range" min="0" max="1.5" step="0.01" value="0.55"></label>
    <label>Lasers <input id="laserAmt" type="range" min="0" max="1" step="0.01" value="0.18"></label>
    <label>Trails <input id="trails" type="range" min="0" max="0.35" step="0.01" value="0.14"></label>
    <label>Particles <input id="particleAmt" type="range" min="0" max="1" step="0.01" value="0.75"></label>
  </div>

  <div id="row">
    <button id="rec" disabled>Start Recording</button>
    <button id="recStop" disabled>Stop Recording</button>
    <button id="dlBtn" disabled>Download Recording</button>
    <label><input id="autoHideWhileRec" type="checkbox" checked> Auto-hide UI while recording</label>
    <label><input id="autoRecOnPlay" type="checkbox" checked> Auto-record on Play</label>
  </div>

  <div id="row">
    <label><input id="showText" type="checkbox" checked> Show text</label>
    <input id="songTitle" type="text" placeholder="Song title" />
    <input id="artistName" type="text" placeholder="Artist name" />
  </div>

  <div id="row">
    <label>Position
      <select id="textPos">
        <option value="tl">Top left</option>
        <option value="tc" selected>Top center</option>
        <option value="tr">Top right</option>
        <option value="bl">Bottom left</option>
        <option value="bc">Bottom center</option>
        <option value="br">Bottom right</option>
      </select>
    </label>
    <label>Size <input id="textSize" type="range" min="14" max="64" step="1" value="34"></label>
    <label>Opacity <input id="textAlpha" type="range" min="0" max="1" step="0.01" value="0.88"></label>
  </div>

  <div id="status">Load a song to begin. Hotkeys: Space play/pause, S stop, R record, H hide UI.</div>
</div>

<canvas id="canvas"></canvas>
<div id="miniHint">Hotkeys: H hide UI • R record • Space play/pause • S stop</div>

<script>
(() => {
  // ---------- Canvas ----------
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d", { alpha: false });

  function resize(){
    const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
    canvas.width = Math.floor(innerWidth * dpr);
    canvas.height = Math.floor(innerHeight * dpr);
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  window.addEventListener("resize", resize);
  resize();

  // ---------- UI ----------
  const controls = document.getElementById("controls");
  const elFile = document.getElementById("file");
  const elPlay = document.getElementById("play");
  const elPause = document.getElementById("pause");
  const elStop = document.getElementById("stop");
  const elClear = document.getElementById("clear");
  const elToggleUI = document.getElementById("toggleUI");
  const elStatus = document.getElementById("status");

  const elIntensity = document.getElementById("intensity");
  const elLaserAmt  = document.getElementById("laserAmt");
  const elTrails    = document.getElementById("trails");
  const elParticleAmt = document.getElementById("particleAmt");

  const elRec = document.getElementById("rec");
  const elRecStop = document.getElementById("recStop");
  const elDlBtn = document.getElementById("dlBtn");
  const elAutoHideWhileRec = document.getElementById("autoHideWhileRec");
  const elAutoRecOnPlay = document.getElementById("autoRecOnPlay");

  const elShowText = document.getElementById("showText");
  const elSongTitle = document.getElementById("songTitle");
  const elArtistName = document.getElementById("artistName");
  const elTextPos = document.getElementById("textPos");
  const elTextSize = document.getElementById("textSize");
  const elTextAlpha = document.getElementById("textAlpha");

  const setStatus = (s) => elStatus.textContent = s;

  function setUIHidden(hidden) {
    controls.classList.toggle("hidden", hidden);
    elToggleUI.textContent = hidden ? "Show UI" : "Hide UI";
  }
  elToggleUI.addEventListener("click", () => {
    setUIHidden(!controls.classList.contains("hidden"));
  });

  // Save overlay fields
  const savedTitle = localStorage.getItem("viz_songTitle");
  const savedArtist = localStorage.getItem("viz_artistName");
  if (savedTitle) elSongTitle.value = savedTitle;
  if (savedArtist) elArtistName.value = savedArtist;
  elSongTitle.addEventListener("input", () => localStorage.setItem("viz_songTitle", elSongTitle.value));
  elArtistName.addEventListener("input", () => localStorage.setItem("viz_artistName", elArtistName.value));

  // ---------- Audio ----------
  let audioCtx = null;
  let analyser = null;
  let srcNode = null;
  let gainNode = null;
  let mediaEl = null;

  let freqData = null;
  let timeData = null;

  function ensureAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 2048;
    analyser.smoothingTimeConstant = 0.82;

    gainNode = audioCtx.createGain();
    gainNode.gain.value = 1.0;

    analyser.connect(gainNode);
    gainNode.connect(audioCtx.destination);

    freqData = new Uint8Array(analyser.frequencyBinCount);
    timeData = new Uint8Array(analyser.fftSize);
  }

  // ---------- Visual helpers/state ----------
  const clamp = (v,a,b) => Math.max(a, Math.min(b, v));
  const lerp = (a,b,t) => a + (b-a)*t;

  function bandEnergy(freq, f0, f1) {
    const n = freq.length;
    const i0 = Math.floor(clamp(f0,0,1) * (n-1));
    const i1 = Math.floor(clamp(f1,0,1) * (n-1));
    let sum = 0;
    for (let i=i0; i<=i1; i++) sum += freq[i];
    return (sum / Math.max(1,(i1-i0+1))) / 255;
  }

  let hueBase = 0;
  let beatPulse = 0;
  let bassEMA = 0;
  let bassVarEMA = 0;
  let beatCooldown = 0;

  const particles = [];
  const MAX_PARTICLES = 900;
  let ambientSpawnAcc = 0;

  function resetVisualState() {
    hueBase = 0;
    beatPulse = 0;
    bassEMA = 0;
    bassVarEMA = 0;
    beatCooldown = 0;
    particles.length = 0;
    ambientSpawnAcc = 0;
  }

  function fullClear() {
    ctx.fillStyle = "rgb(0,0,0)";
    ctx.fillRect(0,0,innerWidth,innerHeight);
  }

  function spawnParticle(x, y, hue, speedMin, speedMax, radiusMin, radiusMax, lifeMin, lifeMax) {
    if (particles.length >= MAX_PARTICLES) return;
    const a = Math.random() * Math.PI * 2;
    const sp = speedMin + Math.random() * (speedMax - speedMin);
    particles.push({
      x, y,
      vx: Math.cos(a) * sp,
      vy: Math.sin(a) * sp,
      r: radiusMin + Math.random() * (radiusMax - radiusMin),
      life: 0,
      max: lifeMin + Math.random() * (lifeMax - lifeMin),
      hue: (hue + (Math.random()*30-15) + 360) % 360
    });
  }

  function spawnBeatParticles(amount, hue) {
    const cx = innerWidth/2, cy = innerHeight/2;
    for (let i=0; i<amount; i++){
      spawnParticle(cx, cy, hue, 0.6, 2.2, 0.9, 2.8, 55, 140);
    }
  }

  function spawnAmbientParticles(dt, amountKnob, hue, mid) {
    const baseRate = 70;
    const rate = baseRate * amountKnob * (0.55 + 0.8 * mid);
    ambientSpawnAcc += rate * dt;

    const count = Math.floor(ambientSpawnAcc);
    if (count <= 0) return;
    ambientSpawnAcc -= count;

    for (let i=0; i<count; i++){
      const edge = Math.floor(Math.random()*4);
      let x=0, y=0;
      if (edge===0) { x = Math.random()*innerWidth; y = -10; }
      if (edge===1) { x = innerWidth+10; y = Math.random()*innerHeight; }
      if (edge===2) { x = Math.random()*innerWidth; y = innerHeight+10; }
      if (edge===3) { x = -10; y = Math.random()*innerHeight; }

      spawnParticle(x, y, hue, 0.14, 0.60, 0.8, 2.6, 140, 290);
    }
  }

  function updateAndDrawParticles(intensity, mid) {
    const amt = parseFloat(elParticleAmt.value);
    if (amt <= 0) return;

    ctx.save();
    ctx.globalCompositeOperation = "lighter";

    for (let i=particles.length-1; i>=0; i--){
      const p = particles[i];
      p.life++;

      p.vx *= 0.992;
      p.vy *= 0.992;

      const curl = 0.0008 + 0.0020 * mid * amt;
      const nx = -p.vy * curl;
      const ny =  p.vx * curl;
      p.vx += nx;
      p.vy += ny;

      p.x += p.vx;
      p.y += p.vy;

      const w = innerWidth, h = innerHeight;
      if (p.x < -60) p.x = w + 60;
      if (p.x > w + 60) p.x = -60;
      if (p.y < -60) p.y = h + 60;
      if (p.y > h + 60) p.y = -60;

      const lifeT = p.life / p.max;
      const a = (1 - lifeT);
      const alpha = clamp(a * (0.10 + 0.25 * amt) * (0.75 + 0.6 * intensity), 0, 0.38);

      ctx.fillStyle = `hsla(${p.hue}, 100%, 65%, ${alpha})`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * (1 + beatPulse * 0.7 * intensity), 0, Math.PI*2);
      ctx.fill();

      if (p.life >= p.max) particles.splice(i, 1);
    }

    ctx.restore();
  }

  // ---------- Text overlay ----------
  function drawOverlayText(w, h, intensity) {
    if (!elShowText.checked) return;

    const title = (elSongTitle.value || "").trim();
    const artist = (elArtistName.value || "").trim();
    if (!title && !artist) return;

    const pos = elTextPos.value;
    const baseSize = parseInt(elTextSize.value, 10) || 34;
    const alpha = clamp(parseFloat(elTextAlpha.value), 0, 1);

    const pulse = 1 + beatPulse * 0.08 * intensity;
    const titleSize = baseSize * pulse;
    const artistSize = Math.max(12, baseSize * 0.55);

    const pad = 18;
    let x = w/2, y = pad;

    let align = "center";
    let baseline = "top";

    if (pos === "tl") { x = pad; y = pad; align = "left"; baseline = "top"; }
    if (pos === "tc") { x = w/2; y = pad; align = "center"; baseline = "top"; }
    if (pos === "tr") { x = w - pad; y = pad; align = "right"; baseline = "top"; }

    if (pos === "bl") { x = pad; y = h - pad; align = "left"; baseline = "bottom"; }
    if (pos === "bc") { x = w/2; y = h - pad; align = "center"; baseline = "bottom"; }
    if (pos === "br") { x = w - pad; y = h - pad; align = "right"; baseline = "bottom"; }

    ctx.save();
    ctx.globalCompositeOperation = "source-over";
    ctx.textAlign = align;
    ctx.textBaseline = baseline;
    ctx.shadowColor = "rgba(0,0,0,0.65)";
    ctx.shadowBlur = 14;

    if (title) {
      ctx.font = `700 ${titleSize}px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif`;
      ctx.fillStyle = `rgba(255,255,255,${alpha})`;
      ctx.fillText(title, x, y);

      const gap = 10;
      if (artist) {
        ctx.font = `500 ${artistSize}px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif`;
        ctx.fillStyle = `rgba(220,220,220,${alpha * 0.92})`;
        const artistY = (baseline === "top") ? (y + titleSize + gap) : (y - titleSize - gap);
        ctx.fillText(artist, x, artistY);
      }
    } else if (artist) {
      ctx.font = `600 ${titleSize}px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif`;
      ctx.fillStyle = `rgba(240,240,240,${alpha})`;
      ctx.fillText(artist, x, y);
    }

    ctx.restore();
  }

  // ---------- Recording ----------
  let recorder = null;
  let chunks = [];
  let recStream = null;
  let lastRecordingUrl = null;

  let isRecording = false;
  let recordStartMs = 0;
  let recordTimer = null;

  function recordSecs() {
    if (!isRecording) return 0;
    return Math.max(0, Math.floor((performance.now() - recordStartMs) / 1000));
  }

  function cleanupLastRecording() {
    if (lastRecordingUrl) {
      try { URL.revokeObjectURL(lastRecordingUrl); } catch {}
      lastRecordingUrl = null;
    }
  }

  function pickMimeType() {
    const candidates = [
      "video/webm;codecs=vp9,opus",
      "video/webm;codecs=vp8,opus",
      "video/webm"
    ];
    return candidates.find(t => window.MediaRecorder?.isTypeSupported?.(t)) || "";
  }

  async function startRecording() {
    if (!mediaEl || !audioCtx || !gainNode) {
      setStatus("Load a song first.");
      return;
    }
    if (!("MediaRecorder" in window)) {
      setStatus("MediaRecorder not supported in this browser.");
      return;
    }
    if (audioCtx.state !== "running") await audioCtx.resume();

    cleanupLastRecording();
    elDlBtn.disabled = true;

    const canvasStream = canvas.captureStream(60);

    const audioDest = audioCtx.createMediaStreamDestination();
    gainNode.connect(audioDest);

    recStream = new MediaStream([
      ...canvasStream.getVideoTracks(),
      ...audioDest.stream.getAudioTracks()
    ]);

    const mimeType = pickMimeType();
    chunks = [];

    try {
      recorder = new MediaRecorder(recStream, mimeType ? { mimeType } : undefined);
    } catch (e) {
      setStatus("Recorder failed to start: " + e.message);
      try { gainNode.disconnect(audioDest); } catch {}
      recStream?.getTracks()?.forEach(t => t.stop());
      recStream = null;
      recorder = null;
      return;
    }

    recorder.onstart = () => {
      isRecording = true;
      recordStartMs = performance.now();

      elRec.disabled = true;
      elRecStop.disabled = false;

      if (elAutoHideWhileRec.checked) setUIHidden(true);

      recordTimer = setInterval(() => {
        if (isRecording) setStatus(`Recording… ${recordSecs()}s (Stop Recording or press R)`);
      }, 500);

      setStatus("Recording… 0s");
    };

    recorder.onerror = (ev) => {
      const msg = ev?.error?.message || "Unknown recording error.";
      setStatus("Recording error: " + msg);
    };

    recorder.ondataavailable = (e) => {
      if (e.data && e.data.size > 0) chunks.push(e.data);
    };

    recorder.onstop = () => {
      isRecording = false;
      clearInterval(recordTimer);
      recordTimer = null;

      try { gainNode.disconnect(audioDest); } catch {}
      try { recStream?.getTracks()?.forEach(t => t.stop()); } catch {}
      recStream = null;

      try {
        const blob = new Blob(chunks, { type: recorder.mimeType || "video/webm" });
        lastRecordingUrl = URL.createObjectURL(blob);
        elDlBtn.disabled = false;
        setStatus(`Recording ready. Click Download Recording.`);
      } catch (e) {
        setStatus("Could not finalize recording: " + e.message);
      }

      recorder = null;
      chunks = [];

      elRec.disabled = false;
      elRecStop.disabled = true;

      if (elAutoHideWhileRec.checked) setUIHidden(false);
    };

    try {
      recorder.start(250);
    } catch (e) {
      setStatus("Recorder.start failed: " + e.message);
      try { gainNode.disconnect(audioDest); } catch {}
      recStream?.getTracks()?.forEach(t => t.stop());
      recStream = null;
      recorder = null;
      chunks = [];
    }
  }

  function stopRecording() {
    if (!recorder) {
      setStatus("No active recording to stop.");
      return;
    }
    try {
      if (recorder.state === "recording") recorder.requestData();
    } catch {}
    try {
      recorder.stop();
    } catch (e) {
      setStatus("Stop failed: " + e.message);
    }
  }

  elRec.addEventListener("click", startRecording);
  elRecStop.addEventListener("click", stopRecording);

  elDlBtn.addEventListener("click", () => {
    if (!lastRecordingUrl) return;
    const a = document.createElement("a");
    a.href = lastRecordingUrl;
    a.download = "visualizer_recording.webm";
    document.body.appendChild(a);
    a.click();
    a.remove();
  });

  // ---------- Load / playback ----------
  function loadFile(file) {
    const url = URL.createObjectURL(file);

    if (mediaEl) {
      try { mediaEl.pause(); } catch {}
    }
    mediaEl = new Audio();
    mediaEl.src = url;
    mediaEl.preload = "auto";

    ensureAudio();

    if (srcNode) {
      try { srcNode.disconnect(); } catch {}
      srcNode = null;
    }
    srcNode = audioCtx.createMediaElementSource(mediaEl);
    srcNode.connect(analyser);

    mediaEl.addEventListener("ended", () => {
      elPlay.disabled = false;
      elPause.disabled = true;
      elStop.disabled = false;
      setStatus("Ended.");
    });

    resetVisualState();
    fullClear();

    elPlay.disabled = false;
    elPause.disabled = true;
    elStop.disabled = true;
    elRec.disabled = false;

    cleanupLastRecording();
    elDlBtn.disabled = true;

    setStatus("Ready. Hit Play. (Auto-record on Play is ON by default.)");
  }

  elFile.addEventListener("change", () => {
    const f = elFile.files?.[0];
    if (!f) return;
    loadFile(f);
  });

  async function play() {
    if (!mediaEl) return;

    ensureAudio();
    if (audioCtx.state !== "running") await audioCtx.resume();

    await mediaEl.play();

    elPlay.disabled = true;
    elPause.disabled = false;
    elStop.disabled = false;

    // Auto-record on Play
    if (elAutoRecOnPlay.checked && !isRecording && !recorder) {
      setStatus("Playing… (auto-recording)");
      setTimeout(() => {
        if (mediaEl && !mediaEl.paused && !isRecording && !recorder) startRecording();
      }, 120);
    } else {
      setStatus(isRecording ? `Recording… ${recordSecs()}s` : "Playing.");
    }
  }

  function pause() {
    if (!mediaEl) return;
    mediaEl.pause();
    elPlay.disabled = false;
    elPause.disabled = true;
    setStatus(isRecording ? `Recording… ${recordSecs()}s (audio paused)` : "Paused.");
  }

  function stopPlayback() {
    if (!mediaEl) return;
    mediaEl.pause();
    mediaEl.currentTime = 0;
    elPlay.disabled = false;
    elPause.disabled = true;
    elStop.disabled = true;
    resetVisualState();
    fullClear();
    setStatus(isRecording ? `Recording… ${recordSecs()}s (rewound)` : "Stopped (rewound).");
  }

  elPlay.addEventListener("click", play);
  elPause.addEventListener("click", pause);
  elStop.addEventListener("click", stopPlayback);

  elClear.addEventListener("click", () => {
    resetVisualState();
    fullClear();
    setStatus(mediaEl && !mediaEl.paused ? (isRecording ? `Recording… ${recordSecs()}s (cleared)` : "Cleared (still playing).") : "Cleared.");
  });

  // ---------- Hotkeys ----------
  document.addEventListener("keydown", (e) => {
    if (e.target && (e.target.tagName === "INPUT" || e.target.tagName === "SELECT" || e.target.tagName === "TEXTAREA")) return;

    if (e.code === "Space") {
      e.preventDefault();
      if (!mediaEl) return;
      if (mediaEl.paused) play();
      else pause();
    } else if (e.key.toLowerCase() === "s") {
      stopPlayback();
    } else if (e.key.toLowerCase() === "h") {
      setUIHidden(!controls.classList.contains("hidden"));
    } else if (e.key.toLowerCase() === "r") {
      if (isRecording) stopRecording();
      else startRecording();
    }
  });

  // ---------- Draw loop ----------
  let lastT = performance.now();

  function draw() {
    requestAnimationFrame(draw);

    const now = performance.now();
    const dt = Math.min(0.05, (now - lastT) / 1000);
    lastT = now;

    const w = innerWidth, h = innerHeight;

    if (!analyser || !freqData || !timeData) {
      ctx.fillStyle = "rgb(0,0,0)";
      ctx.fillRect(0,0,w,h);
      return;
    }

    analyser.getByteFrequencyData(freqData);
    analyser.getByteTimeDomainData(timeData);

    const intensity = parseFloat(elIntensity.value);
    const laserAmt = parseFloat(elLaserAmt.value);
    const trails = parseFloat(elTrails.value);
    const particleAmt = parseFloat(elParticleAmt.value);

    const low  = bandEnergy(freqData, 0.00, 0.10);
    const mid  = bandEnergy(freqData, 0.10, 0.40);
    const high = bandEnergy(freqData, 0.40, 0.95);

    const bass = low;
    bassEMA = lerp(bassEMA, bass, 0.10);
    const diff = Math.abs(bass - bassEMA);
    bassVarEMA = lerp(bassVarEMA, diff, 0.07);

    const threshold = bassEMA + (0.12 + bassVarEMA * 1.7);
    const isBeat = (bass > threshold) && beatCooldown <= 0;

    if (isBeat) {
      beatPulse = 1.0;
      beatCooldown = 10;
      if (intensity > 0.12 && particleAmt > 0.05) {
        spawnBeatParticles(Math.floor(10 + 26 * intensity * particleAmt), hueBase);
      }
    } else {
      beatPulse *= 0.90;
      beatCooldown = Math.max(0, beatCooldown - 1);
    }

    hueBase = (hueBase + 0.25 + high*1.2) % 360;

    if (particleAmt > 0.01) {
      spawnAmbientParticles(dt, particleAmt, hueBase, mid);
    }

    ctx.globalCompositeOperation = "source-over";
    ctx.fillStyle = `rgba(0,0,0,${clamp(trails, 0, 0.6)})`;
    ctx.fillRect(0,0,w,h);

    const washA = 0.05 * intensity + 0.02 * beatPulse;
    if (washA > 0.001) {
      const gx = w*(0.5 + Math.sin(now*0.00035)*0.1);
      const gy = h*(0.5 + Math.cos(now*0.00032)*0.1);
      const r  = Math.max(w,h)*(0.55 + 0.15*mid);
      const grad = ctx.createRadialGradient(gx,gy,0,gx,gy,r);
      grad.addColorStop(0, `hsla(${(hueBase+0)%360}, 95%, 55%, ${washA})`);
      grad.addColorStop(0.6, `hsla(${(hueBase+120)%360}, 95%, 50%, ${washA*0.75})`);
      grad.addColorStop(1, `hsla(${(hueBase+240)%360}, 95%, 45%, ${washA*0.55})`);
      ctx.fillStyle = grad;
      ctx.fillRect(0,0,w,h);
    }

    ctx.save();
    ctx.globalCompositeOperation = "lighter";

    const cx = w/2, cy = h/2;
    const baseR = Math.min(w,h) * (0.12 + 0.05*intensity);
    const maxR  = Math.min(w,h) * (0.28 + 0.06*intensity);
    const spokes = Math.floor(95 + 125*intensity);

    for (let s=0; s<spokes; s++){
      const idx = Math.floor((s/spokes) * (freqData.length*0.85));
      const v = (freqData[idx] / 255) * (0.6 + 0.7*intensity);
      const a = (s/spokes) * Math.PI * 2;

      const pump = 1 + beatPulse * 0.20 * intensity;
      const r0 = baseR * pump;
      const r1 = lerp(r0, maxR * pump, Math.pow(v, 0.9));

      const x0 = cx + Math.cos(a)*r0;
      const y0 = cy + Math.sin(a)*r0;
      const x1 = cx + Math.cos(a)*r1;
      const y1 = cy + Math.sin(a)*r1;

      ctx.lineWidth = 1.0 + 1.6*v;
      const hue = (hueBase + s*1.0) % 360;
      ctx.strokeStyle = `hsla(${hue},100%,60%,${0.05 + 0.12*v})`;
      ctx.beginPath();
      ctx.moveTo(x0,y0);
      ctx.lineTo(x1,y1);
      ctx.stroke();
    }

    const step = Math.max(1, Math.floor(timeData.length / 820));
    const amp = (0.06 + 0.18*intensity + 0.12*beatPulse*intensity) * h;

    ctx.lineWidth = 2.0 + 2.0*beatPulse*intensity;
    ctx.strokeStyle = `hsla(${(hueBase+140)%360},100%,65%,${0.12 + 0.12*intensity})`;
    ctx.beginPath();
    for (let i=0; i<timeData.length; i+=step){
      const v = (timeData[i]-128)/128;
      const x = (i/(timeData.length-1)) * w;
      const y = cy + v*amp;
      if (i===0) ctx.moveTo(x,y);
      else ctx.lineTo(x,y);
    }
    ctx.stroke();

    const laserCount = Math.floor(laserAmt * (7 + 55*high) * intensity);
    if (laserCount > 0) {
      for (let i=0; i<laserCount; i++){
        const a = (now*0.0006 + i*0.42) + Math.sin(now*0.001 + i)*0.25;
        const len = Math.max(w,h) * (0.55 + Math.random()*0.25);
        const x1 = cx + Math.cos(a)*len;
        const y1 = cy + Math.sin(a)*len;

        ctx.lineWidth = 0.8 + 2.0*beatPulse*intensity;
        const hue = (hueBase + 200 + i*10) % 360;
        const alpha = 0.01 + 0.05*laserAmt + 0.05*beatPulse*intensity;
        ctx.strokeStyle = `hsla(${hue},100%,60%,${clamp(alpha,0,0.14)})`;
        ctx.beginPath();
        ctx.moveTo(cx,cy);
        ctx.lineTo(x1,y1);
        ctx.stroke();
      }
    }

    ctx.restore();

    updateAndDrawParticles(intensity, mid);
    drawOverlayText(w, h, intensity);
  }

  // ---------- Init ----------
  fullClear();
  draw();

  if (!("MediaRecorder" in window)) {
    elRec.disabled = true;
    elRecStop.disabled = true;
    elDlBtn.disabled = true;
    setStatus("MediaRecorder not supported in this browser.");
  }

})();
</script>
